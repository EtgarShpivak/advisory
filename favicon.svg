<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1321"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbb85c"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Compass needle / upward arrow — represents GTM direction & clarity -->
  <path d="M16 5 L21 18 L16 15 L11 18 Z" fill="url(#gold)"/>
  <!-- Base dot — the founder's starting point -->
  <circle cx="16" cy="24" r="2.5" fill="url(#gold)" opacity="0.6"/>
  <!-- Subtle ring — the advisory orbit -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
